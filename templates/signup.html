{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var h=localStorage.getItem('cr_hide_badges')==='1';var c=localStorage.getItem('cr_hide_chatbot')==='1';if(h)document.documentElement.setAttribute('data-hide-badges','1');if(c)document.documentElement.setAttribute('data-hide-chatbot','1');})();</script>
<title>회원가입 — KultureRoute</title>
<link rel="icon" type="image/png" href="/static/culture/icon.png">
<link href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'frontend/css/common.css' %}">
<link rel="stylesheet" href="{% static 'frontend/css/signup.css' %}">
</head>
<body>

<nav>
  <a href="/" class="logo">
    <img src="{% static 'culture/icon.png' %}" alt="logo" class="logo-mark">
    Kulture<span>Route</span>
  </a>
  <a href="/login/" class="nav-link">로그인</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="card-logo">
      <img src="{% static 'culture/icon.png' %}" alt="logo" class="card-logo-mark">
      <span class="card-logo-text">Kulture<span>Route</span></span>
    </div>

    <p class="card-eyebrow">Sign Up</p>
    <h1 class="card-title">회원가입</h1>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input class="form-input" id="username" type="text" placeholder="3자 이상의 아이디" autocomplete="username">
        <p class="field-hint">영문·숫자 조합, 3자 이상</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-input" id="password" type="password" placeholder="8자 이상의 비밀번호" autocomplete="new-password">
        <p class="field-hint">8자 이상, 숫자만으로 구성할 수 없습니다</p>
      </div>

            
      <div class="form-group">
        <label class="form-label" for="password2">비밀번호 확인</label>
        <input class="form-input" id="password2" type="password" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
        <p class="pw-match" id="pw-match"></p>
      </div>


      <div class="form-group">
        <label class="form-label" for="nickname">닉네임</label>
        <input class="form-input" id="nickname" type="text" placeholder="2~10자, 한글/영문/숫자만" autocomplete="off" maxlength="10">
        <p class="pw-match" id="nickname-msg"></p>
      </div>
            
      <div class="error-msg" id="error-msg"></div>

      <button class="submit-btn" type="submit" id="submit-btn">회원가입</button>
    </form>

    <div class="social-divider">또는 간편 가입</div>
    <div class="social-login-group">
      <a class="social-btn social-btn-kakao" href="/api/accounts/social/kakao/">
        <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5C6.201 2.5 1.5 6.26 1.5 10.9c0 2.968 1.872 5.575 4.704 7.093l-.967 3.607a.375.375 0 0 0 .557.42l4.046-2.578A12.39 12.39 0 0 0 12 19.3c5.799 0 10.5-3.76 10.5-8.4S17.799 2.5 12 2.5z"/></svg>
        카카오로 시작
      </a>
      <a class="social-btn social-btn-naver" href="/api/accounts/social/naver/">
        <svg class="social-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg>
        네이버로 시작
      </a>
    </div>

    <div class="divider"></div>
    <p class="card-footer">
      이미 계정이 있으신가요? <a href="/login/">로그인</a>
    </p>
  </div>
</div>

<footer>
  <div class="footer-logo">
    <img src="{% static 'culture/icon.png' %}" alt="logo" class="logo-mark">
    Kulture<span>Route</span>
  </div>
  <p class="footer-copy">© 2026 KultureRoute · 서울6반 1조</p>
</footer>

<script>
// 이미 로그인된 상태면 홈으로 이동
(async () => {
  try {
    const res = await fetch('/api/accounts/me/');
    if (res.ok) location.replace('/');
  } catch(e) {}
})();

// 닉네임 중복확인 (0.5초 디바운스)
let nicknameAvailable = false; // 빈 값(닉네임 미입력)도 가입 허용
let _nicknameDebounce = null;
function syncSubmitState() {
  document.getElementById('submit-btn').disabled = !nicknameAvailable;
}
document.getElementById('nickname').addEventListener('input', () => {
  clearTimeout(_nicknameDebounce);
  const nickname = document.getElementById('nickname').value.trim();
  const el = document.getElementById('nickname-msg');
  if (!nickname) { nicknameAvailable = true; el.className = 'pw-match'; el.textContent = ''; syncSubmitState(); return; }
  nicknameAvailable = false;
  syncSubmitState();
  el.className = 'pw-match'; el.textContent = '확인 중…';
  _nicknameDebounce = setTimeout(async () => {
    try {
      const res = await fetch('/api/accounts/check-nickname/?nickname=' + encodeURIComponent(nickname));
      const data = await res.json();
      nicknameAvailable = !!data.available;
      el.textContent = data.available ? '사용 가능한 닉네임입니다' : (data.detail || '이미 사용 중인 닉네임입니다');
      el.className = 'pw-match ' + (data.available ? 'ok' : 'ng');
    } catch (e) {
      nicknameAvailable = false;
      el.textContent = '중복 확인에 실패했습니다.';
      el.className = 'pw-match ng';
    }
    syncSubmitState();
  }, 500);
});

// 비밀번호 확인 실시간 체크
document.getElementById('password2').addEventListener('input', () => {
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const el = document.getElementById('pw-match');
  if (!pw2) { el.className = 'pw-match'; return; }
  if (pw === pw2) { el.textContent = '비밀번호가 일치합니다.'; el.className = 'pw-match ok'; }
  else           { el.textContent = '비밀번호가 일치하지 않습니다.'; el.className = 'pw-match ng'; }
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');

  errEl.classList.remove('show');

  if (nickname && !nicknameAvailable) {
    errEl.textContent = '닉네임을 확인해 주세요.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = '처리 중…';

  try {
    const res = await fetch('/api/accounts/signup/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, nickname, password, password2})
    });
    const data = await res.json();

    if (res.ok) {
      location.href = '/';
    } else {
      errEl.textContent = data.detail || '회원가입에 실패했습니다.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '회원가입';
    }
  } catch(e) {
    errEl.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = '회원가입';
  }
});
</script>
</body>
</html>
